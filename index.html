<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickers图鉴</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        /* 状态提示文字 */
        #status {
            text-align: center;
            font-size: 1.2em;
            color: #666;
            margin-top: 20px;
        }

        /* 网格布局容器 */
        #stickersContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* 单个卡片样式 */
        .stamp {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .stamp:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .stamp img {
            width: 100px;
            height: 100px;
            object-fit: contain; /* 保持图片比例 */
            margin-bottom: 10px;
            background-color: #fafafa;
            border-radius: 5px;
        }

        .stamp h3 {
            margin: 5px 0;
            font-size: 16px;
            color: #333;
        }

        .stamp p {
            margin: 0;
            font-size: 12px;
            color: #888;
            word-break: break-all; /* 防止长文件名撑破布局 */
        }
    </style>
</head>
<body>

<h1>Stickers 图鉴</h1>
<div id="status">正在加载数据...</div>
<div id="stickersContainer"></div>

<script>
    const container = document.getElementById('stickersContainer');
    const statusMsg = document.getElementById('status');

    fetch('https://fcdata.forclass.net/AttachFiles/171806/stickers/stickers.json')
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP 错误! 状态码: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            // 清除加载提示
            statusMsg.style.display = 'none';

            data.forEach(stamp => {
                const stampDiv = document.createElement('div');
                stampDiv.classList.add('stamp');
                
                // 图片
                const img = document.createElement('img');
                // 假设 assetbundleName 就是文件名
                img.src = `https://fcdata.forclass.net/AttachFiles/171806/stickers/${stamp.assetbundleName}.png`; 
                img.alt = stamp.name;
                img.loading = "lazy"; // 图片懒加载，提升性能
                
                // 图片加载失败的处理
                img.onerror = function() {
                    this.src = 'https://via.placeholder.com/100?text=No+Img'; // 默认占位图
                    this.alt = "图片加载失败";
                };

                // ID 和 名字
                const h3 = document.createElement('h3');
                h3.textContent = stamp.name;
                
                // 描述/文件名
                const description = document.createElement('p');
                description.innerHTML = `ID: <b>${stamp.id}</b><br>${stamp.assetbundleName}`;
                
                stampDiv.appendChild(img);
                stampDiv.appendChild(h3);
                stampDiv.appendChild(description);
                
                container.appendChild(stampDiv);
            });

            // 如果数据为空
            if (data.length === 0) {
                statusMsg.textContent = "JSON 文件中没有数据。";
                statusMsg.style.display = 'block';
            }
        })
        .catch(error => {
            console.error('获取 JSON 数据失败:', error);
            statusMsg.textContent = "加载失败，请检查 stickers.json 是否存在。";
            statusMsg.style.color = "red";
        });
</script>

</body>
</html>
